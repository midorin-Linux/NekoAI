[workspace]
members = [
    "crates/agent",
    "crates/cli",
    "crates/config",
    "crates/discord",
    "crates/domain",
    "crates/infra",
    "crates/memory",
#    "crates/setup",
    "crates/tools"
]
resolver = "2"

[workspace.package]
version = "1.0.0"
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
agent = { path = "crates/agent" }
cli = { path = "crates/cli" }
config = { path = "crates/config" }
discord = { path = "crates/discord" }
domain = { path = "crates/domain" }
infra = { path = "crates/infra" }
memory = { path = "crates/memory" }
#setup = { path = "crates/setup" }
tools = { path = "crates/tools" }

anyhow = "1.0.102"
chrono = "0.4.44"
dashmap = "7.0.0-rc2"
dialoguer = "0.12.0"
indicatif = "0.18.4"
rig-core = { version = "0.34.0", features = ["image", "derive"]}
rig-qdrant = "0.2.3"
serenity = { version = "0.12.5", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.51.1", features = ["full"] }
tracing = "0.1.44"