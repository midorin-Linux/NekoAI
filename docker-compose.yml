services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nekoai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nekoai-redis
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: nekoai-searxng
    depends_on:
      - redis
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_SECRET_KEY: change-me
      SEARXNG_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./docker-settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

volumes:
  qdrant_storage:
